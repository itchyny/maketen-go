name: CI

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Build
        run: make build
      - name: Run command
        run: ./maketen 1 2 3 4 | grep -x '1 + 2 + 3 + 4'
      - name: Cross build
        run: make cross
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: goxz
          path: goxz
      - name: Clean
        run: make clean

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Install bc
        if: runner.os == 'Windows'
        shell: bash
        run: |
          /c/msys64/usr/bin/pacman -S --noconfirm bc
          echo "C:/msys64/usr/bin" >> "$GITHUB_PATH"
      - name: Test
        run: make test
      - name: Lint
        run: make lint

  release:
    name: Release
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: goxz
          path: goxz
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          name: Release ${{ github.ref_name }}
          artifacts: goxz/*
